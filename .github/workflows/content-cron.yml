name: Content Bot — Daily Auto Publish

on:
  schedule:
    # 매일 KST 새벽 3시 = UTC 18시 (전날)
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "이번 실행에 생성할 글 수"
        required: false
        default: "1"

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: content-bot/requirements.txt

      - name: Install dependencies
        working-directory: content-bot
        run: pip install -r requirements.txt

      - name: Generate post
        working-directory: content-bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-7' }}
          COUPANG_PARTNERS_ID: ${{ secrets.COUPANG_PARTNERS_ID }}
          BLOG_BASE_URL: ${{ vars.BLOG_BASE_URL }}
          BLOG_AUTHOR: ${{ vars.BLOG_AUTHOR || '익명' }}
        run: python -m src.main -n ${{ inputs.count || 1 }}

      - name: Commit generated posts
        run: |
          git config user.name "content-bot"
          git config user.email "content-bot@users.noreply.github.com"
          git add content-bot/blog/posts content-bot/.cache || true
          if git diff --cached --quiet; then
            echo "No new content to commit."
            exit 0
          fi
          git commit -m "chore(content): auto-publish $(date -u +%Y-%m-%d)"
          git push
